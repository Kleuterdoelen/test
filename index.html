<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doelenregistratie</title>
<style>
body { font-family: Arial, sans-serif; background: #f2f6fb; padding: 20px; margin: 0; }
.container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; }
h2 { text-align: center; }
.nav-buttons { display: flex; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; gap: 10px; }
.nav-buttons button { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; color: white; }
.nav-primary { background: #3498db; }
.nav-settings { background: #f39c12; }
.nav-save { background: #27ae60; color: white; border-radius: 6px; padding: 10px 20px; margin-top: 10px; cursor: pointer; display: block; }
.form-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
.field { flex: 1 1 180px; display: flex; flex-direction: column; margin-bottom: 10px; }
input, select { padding: 5px; font-size: 14px; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; overflow-x: auto; display: block; }
th, td { border-bottom: 1px solid #ddd; padding: 10px 5px; text-align: center; vertical-align: top; word-wrap: break-word; }
th { font-weight: bold; }
td:nth-child(1), th:nth-child(1) { text-align: left; padding-left: 10px; width: 25%; }
td:nth-child(n+2), th:nth-child(n+2) { width: 15%; }
.circle { width: 35px; height: 35px; border-radius: 50%; border: none; opacity: 0.4; cursor: pointer; margin: auto; display: block; }
.active { opacity: 1; transform: scale(1.2); }
.red { background: #e74c3c; }
.orange { background: #f39c12; }
.lightgreen { background: #2ecc71; }
.darkgreen { background: blue; }
.grey { background: #95a5a6; }
.success { color: #27ae60; margin-top: 10px; font-weight: bold; text-align: center; }
@media (max-width: 768px) { .form-row { flex-direction: column; } table { font-size: 12px; } .circle { width: 30px; height: 30px; } }
@media (max-width: 480px) { body { padding: 10px; } .container { padding: 15px; } input, select { font-size: 12px; } .circle { width: 28px; height: 28px; } }
</style>
</head>
<body>

<script>
// Alleen toegang na login
const role = localStorage.getItem("role");
if(!role){
    window.location = "login.html";
}
</script>

<div class="container">
<h2>Doelenregistratie</h2>

<div class="nav-buttons">
  <a href="overzicht.html"><button class="nav-primary">Overzicht leerling</button></a>
  <a href="settings.html"><button class="nav-settings">Instellingen</button></a>
  <a href="klas.html"><button class="nav-settings">Klassen wijzigen</button></a>
  <button style="background:#e74c3c;" onclick="logout()">Uitloggen</button>
</div>

<div class="form-row">
  <div class="field">
    <label>Klas</label>
    <input list="klassen" id="klas" placeholder="Selecteer een klas">
    <datalist id="klassen"></datalist>
  </div>
  <div class="field">
    <label>Domein</label>
    <input list="domeinen" id="domein" placeholder="Selecteer een domein">
    <datalist id="domeinen"></datalist>
  </div>
  <div class="field">
    <label>Thema</label>
    <input list="themas" id="thema" placeholder="Selecteer een thema">
    <datalist id="themas"></datalist>
  </div>
  <div class="field">
    <label>Doel</label>
    <input list="doelen" id="doel" placeholder="Selecteer een doel">
    <datalist id="doelen"></datalist>
  </div>
  <div class="field">
    <label>Datum</label>
    <input type="date" id="datum">
  </div>
</div>

<table>
  <tbody id="studentTable"></tbody>
</table>

<button class="nav-save" onclick="opslaan()">Opslaan</button>
<div id="melding" class="success"></div>
</div>

<script>
// Haal data uit localStorage (van settings.html)
let students = JSON.parse(localStorage.getItem("students")) || [];
let registraties = JSON.parse(localStorage.getItem("registraties")) || [];
let domeinen = JSON.parse(localStorage.getItem("domeinen")) || [];
let themasPerDomein = JSON.parse(localStorage.getItem("themasPerDomein")) || {};
let doelUitlegPerThema = JSON.parse(localStorage.getItem("doelUitlegPerThema")) || {};

document.getElementById("datum").valueAsDate = new Date();

function getStoredStudents(){ return students; }
function uniqueArray(arr){ return [...new Set(arr)]; }
function sorteerOpAchternaam(lijst){
    return lijst.sort((a,b)=>{
        const partsA = a.name.trim().split(" ");
        const partsB = b.name.trim().split(" ");
        const achternaamA = partsA.slice(1).join(" ").toLowerCase();
        const achternaamB = partsB.slice(1).join(" ").toLowerCase();
        if(achternaamA === achternaamB) return partsA[0].toLowerCase().localeCompare(partsB[0].toLowerCase());
        return achternaamA.localeCompare(achternaamB);
    });
}

// Vul dropdowns met data van settings
function updateDatalists(){
    const dataklassen = document.getElementById("klassen"); dataklassen.innerHTML="";
    uniqueArray(getStoredStudents().map(s=>s.klas)).sort().forEach(k=>{ if(k){ const opt=document.createElement("option"); opt.value=k; dataklassen.appendChild(opt); } });

    const datadomeinen = document.getElementById("domeinen"); datadomeinen.innerHTML="";
    domeinen.forEach(d=>{ const opt=document.createElement("option"); opt.value=d; datadomeinen.appendChild(opt); });

    const domein = document.getElementById("domein").value;
    const datathemas = document.getElementById("themas"); datathemas.innerHTML="";
    if(domein && themasPerDomein[domein]) themasPerDomein[domein].forEach(t=>{ const opt=document.createElement("option"); opt.value=t; datathemas.appendChild(opt); });

    const thema = document.getElementById("thema").value;
    const datadoelen = document.getElementById("doelen"); datadoelen.innerHTML="";
    if(thema && doelUitlegPerThema[thema]) Object.keys(doelUitlegPerThema[thema]).forEach(d=>{ const opt=document.createElement("option"); opt.value=d; datadoelen.appendChild(opt); });
}

// Toon tabel op basis van geselecteerde klas, domein, thema en doel
function updateStudentTable(){
    const table = document.getElementById("studentTable"); table.innerHTML="";
    const klas = document.getElementById("klas").value;
    const domein = document.getElementById("domein").value;
    const thema = document.getElementById("thema").value;
    const doel = document.getElementById("doel").value;
    if(!klas) return;
    let leerlingen = getStoredStudents().filter(s=>s.klas===klas); leerlingen = sorteerOpAchternaam(leerlingen);
    if(leerlingen.length===0){ table.innerHTML=`<tr><td colspan="6">Geen leerlingen in deze klas</td></tr>`; return; }

    const headerRow = document.createElement("tr");
    if(thema && doel && doelUitlegPerThema[thema] && doelUitlegPerThema[thema][doel]){
        const uitleg = doelUitlegPerThema[thema][doel];
        headerRow.innerHTML=`<th>Leerling</th>
            <th>🔴 ${uitleg.Starter||""}</th>
            <th>🟠 ${uitleg.Lerende||""}</th>
            <th>🟢 ${uitleg.Gevorderd||""}</th>
            <th>🔵 ${uitleg.Expert||""}</th>
            <th>⚪ ${uitleg.Afwezig||""}</th>`;
    } else {
        headerRow.innerHTML=`<th>Leerling</th>
            <th>🔴</th>
            <th>🟠</th>
            <th>🟢</th>
            <th>🔵</th>
            <th>⚪</th>`;
    }
    table.appendChild(headerRow);

    leerlingen.forEach(student=>{
        const row = document.createElement("tr");
        row.innerHTML=`<td>${student.name}</td>
            <td><button class="circle red"></button></td>
            <td><button class="circle orange"></button></td>
            <td><button class="circle lightgreen"></button></td>
            <td><button class="circle darkgreen"></button></td>
            <td><button class="circle grey"></button></td>`;
        table.appendChild(row);
    });
}

// Klik op cirkels voor niveau
document.addEventListener("click", function(e){
    if(e.target.classList.contains("circle")){
        const row = e.target.closest("tr");
        row.querySelectorAll(".circle").forEach(btn=>btn.classList.remove("active"));
        e.target.classList.add("active");
    }
});

// Opslaan van registratie
function opslaan(){
    const klas = document.getElementById("klas").value;
    const domein = document.getElementById("domein").value;
    const thema = document.getElementById("thema").value;
    const doel = document.getElementById("doel").value;
    const datum = document.getElementById("datum").value;
    if(!klas || !domein || !thema || !doel || !datum){ alert("Vul alle velden in!"); return; }
    const leerlingen = getStoredStudents().filter(s=>s.klas===klas);
    if(leerlingen.length===0){ alert("Er zijn geen leerlingen in deze klas!"); return; }

    let nieuweRegistratie = { klas, domein, thema, doel, datum, resultaten: [] };
    leerlingen.forEach(student=>{
        let tr = Array.from(document.getElementById("studentTable").rows).find(r=>r.cells[0].textContent===student.name);
        if(!tr) return;
        let niveau = "-";
        if(tr.cells[1].querySelector("button").classList.contains("active")) niveau="Starter";
        else if(tr.cells[2].querySelector("button").classList.contains("active")) niveau="Lerende";
        else if(tr.cells[3].querySelector("button").classList.contains("active")) niveau="Gevorderd";
        else if(tr.cells[4].querySelector("button").classList.contains("active")) niveau="Expert";
        else if(tr.cells[5].querySelector("button").classList.contains("active")) niveau="Afwezig";
        else return;
        nieuweRegistratie.resultaten.push({ naam: student.name, niveau });
    });

    if(nieuweRegistratie.resultaten.length>0){
        registraties.push(nieuweRegistratie);
        localStorage.setItem("registraties", JSON.stringify(registraties));
        document.getElementById("melding").innerText="✔ Registratie opgeslagen!";
        setTimeout(()=>{ document.getElementById("melding").innerText=""; }, 2000);
    }
}

// Logout functie
function logout(){ localStorage.clear(); window.location="login.html"; }

// Event listeners om dropdowns en tabel te updaten
document.getElementById("klas").addEventListener("input", ()=>{ updateDatalists(); updateStudentTable(); });
document.getElementById("domein").addEventListener("input", ()=>{ updateDatalists(); updateStudentTable(); });
document.getElementById("thema").addEventListener("input", ()=>{ updateDatalists(); updateStudentTable(); });
document.getElementById("doel").addEventListener("input", ()=>{ updateStudentTable(); });

// INIT
updateDatalists();
updateStudentTable();
</script>

</body>
</html>
